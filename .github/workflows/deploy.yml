name: Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout app submodules
        run: git -c url."https://x-access-token:${SUBMODULE_PAT}@github.com/".insteadOf="https://github.com/" submodule update --init apps/api apps/web services/voice-worker
        env:
          SUBMODULE_PAT: ${{ secrets.SUBMODULE_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/api/package-lock.json'

      - name: Install API deps
        run: cd apps/api && npm ci

      - name: TypeScript check
        run: cd apps/api && npx tsc --noEmit

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          cd services/voice-worker
          pip install -r requirements.txt

      - name: Python type check
        run: |
          cd services/voice-worker
          python -c "import main; print('Import OK')"

  # ── Deploy API to Railway ───────────────────────────────────────────────────
  deploy-api:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Checkout app submodules
        run: git -c url."https://x-access-token:${SUBMODULE_PAT}@github.com/".insteadOf="https://github.com/" submodule update --init apps/api apps/web services/voice-worker
        env:
          SUBMODULE_PAT: ${{ secrets.SUBMODULE_PAT }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API
        run: railway up --service api
        working-directory: apps/api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Deploy Voice Worker to Railway ─────────────────────────────────────────
  deploy-worker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Checkout app submodules
        run: git -c url."https://x-access-token:${SUBMODULE_PAT}@github.com/".insteadOf="https://github.com/" submodule update --init apps/api apps/web services/voice-worker
        env:
          SUBMODULE_PAT: ${{ secrets.SUBMODULE_PAT }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Voice Worker
        run: railway up --service voice-worker
        working-directory: services/voice-worker
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Deploy Frontend to Vercel ───────────────────────────────────────────────
  deploy-web:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Checkout app submodules
        run: git -c url."https://x-access-token:${SUBMODULE_PAT}@github.com/".insteadOf="https://github.com/" submodule update --init apps/api apps/web services/voice-worker
        env:
          SUBMODULE_PAT: ${{ secrets.SUBMODULE_PAT }}

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
